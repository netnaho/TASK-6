services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrideclare-postgres
    env_file:
      - .compose.defaults.env
      - path: .compose.env
        required: false
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: nutrideclare-backend
    env_file:
      - .compose.defaults.env
      - path: .compose.env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      DB_ENCRYPTION_ENABLED: ${DB_ENCRYPTION_ENABLED:-true}
      STORAGE_ROOT: /var/lib/nutrideclare/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/nutrideclare/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: nutrideclare-frontend
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  file_storage:
